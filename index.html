<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESGCI — Attestations d'Inscription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="lib/jspdf.umd.min.js"></script>
<script src="lib/qrcode.min.js"></script>
<style>
:root {
  --bg:        #f4f1ea;
  --bg2:       #ece8de;
  --sidebar:   #ffffff;
  --card:      #ffffff;
  --paper:     #fffef8;
  --navy:      #0d1b8e;
  --navy2:     #162099;
  --navy3:     #0a1470;
  --gold:      #c9a227;
  --golddim:   rgba(201,162,39,.12);
  --text:      #18152e;
  --text2:     #55527a;
  --text3:     #9b98b8;
  --border:    rgba(0,0,0,.07);
  --inbg:      #f8f6f1;
  --inb:       #dedad0;
  --r:         10px;
  --sh:        0 2px 20px rgba(13,27,142,.07);
  --shmd:      0 8px 36px rgba(13,27,142,.13);
  --shlg:      0 24px 64px rgba(0,0,0,.14);
}
[data-theme="dark"] {
  --bg:        #080d1f;
  --bg2:       #0d1535;
  --sidebar:   #0f1a3a;
  --card:      #111d40;
  --paper:     #131d3e;
  --navy:      #5272ff;
  --navy2:     #6080ff;
  --navy3:     #3a58e8;
  --gold:      #e0b840;
  --golddim:   rgba(224,184,64,.10);
  --text:      #e5e2f5;
  --text2:     #8885a8;
  --text3:     #504e6a;
  --border:    rgba(255,255,255,.07);
  --inbg:      #0d1535;
  --inb:       #243060;
  --sh:        0 2px 20px rgba(0,0,0,.3);
  --shmd:      0 8px 36px rgba(0,0,0,.4);
  --shlg:      0 24px 64px rgba(0,0,0,.5);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100%;transition:background .3s,color .3s}

/* ── HEADER ── */
.hdr{
  height:58px;position:sticky;top:0;z-index:200;
  background:linear-gradient(118deg,var(--navy3) 0%,var(--navy) 55%,var(--navy2) 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;box-shadow:0 2px 20px rgba(0,0,0,.22);
}
.hdr-brand{display:flex;align-items:center;gap:14px}
.hdr-logo{
  font-family:'Playfair Display',Georgia,serif;
  font-size:22px;font-weight:700;color:#fff;
  letter-spacing:-.5px;line-height:1;position:relative;
}
.hdr-logo::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;
  height:1.5px;background:var(--gold);
}
.hdr-sub{font-size:11.5px;color:rgba(255,255,255,.58);letter-spacing:.1px}
.hdr-actions{display:flex;align-items:center;gap:10px}
.dark-btn{
  width:42px;height:22px;border-radius:11px;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);
  cursor:pointer;position:relative;transition:background .2s;
}
.dark-btn::before{
  content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;background:#fff;
  transition:transform .22s,background .22s;
}
[data-theme="dark"] .dark-btn::before{transform:translateX(20px);background:var(--gold)}
.lang-btn{
  padding:4px 11px;border-radius:6px;
  background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);
  color:#fff;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:.6px;cursor:pointer;transition:background .2s,transform .1s;
}
.lang-btn:hover{background:rgba(255,255,255,.22)}
.lang-btn:active{transform:scale(.95)}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:385px 1fr;min-height:calc(100vh - 58px)}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:background .3s;
}
.sb-inner{padding:22px 20px 16px;flex:1}

.sec-lbl{
  font-size:9.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:11px;
  display:flex;align-items:center;gap:8px;
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--golddim)}
.form-sec{margin-bottom:18px}

.row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.row.full{grid-template-columns:1fr}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
.fld label .r{color:var(--gold)}

.fld input,.fld select{
  padding:9px 11px;border:1.5px solid var(--inb);border-radius:8px;
  font-size:13px;color:var(--text);background:var(--inbg);
  outline:none;width:100%;font-family:inherit;
  transition:border-color .15s,box-shadow .15s,background .15s;
}
.fld input:focus,.fld select:focus{
  border-color:var(--navy);
  box-shadow:0 0 0 3px rgba(13,27,142,.10);
  background:var(--sidebar);
}
[data-theme="dark"] .fld input:focus,[data-theme="dark"] .fld select:focus{
  box-shadow:0 0 0 3px rgba(82,114,255,.15);
}
.fld input::placeholder{color:var(--text3);font-size:12.5px}

.gen-wrap{
  padding:16px 20px;border-top:1px solid var(--border);
  background:var(--sidebar);position:sticky;bottom:0;
}
.btn-gen{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--navy3) 0%,var(--navy) 55%,var(--navy2) 100%);
  color:#fff;border:none;border-radius:var(--r);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:.2px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
}
.btn-gen::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--gold);transform:scaleX(0);transition:transform .3s;
}
.btn-gen:hover::after{transform:scaleX(1)}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(13,27,142,.32)}
.btn-gen:active{transform:translateY(0)}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── PREVIEW PANE ── */
.preview-pane{
  display:flex;flex-direction:column;
  background:var(--bg);overflow-y:auto;
  transition:background .3s;
}
.pv-inner{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:26px 28px 44px;gap:18px;
}

.tab-bar{display:flex;gap:6px;align-self:flex-start}
.tab-pill{
  padding:6px 16px;border-radius:18px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;
  transition:all .2s;backdrop-filter:blur(8px);
}
.tab-pill.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 4px 12px rgba(13,27,142,.25)}
.tab-pill:not(.active):hover{border-color:var(--navy);color:var(--navy)}

/* ── CERTIFICATE PAPER ── */
.cert-wrap{position:relative}
.cert-paper{
  width:520px;background:var(--paper);border-radius:3px;
  box-shadow:var(--shlg);overflow:hidden;
  font-family:'Playfair Display',Georgia,serif;position:relative;
  transition:box-shadow .3s;
}
.cert-paper.glow{box-shadow:0 0 0 2px var(--gold),var(--shlg)}
.cert-paper::before{
  content:'SAMPLE';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-35deg);
  font-family:'DM Mono',monospace;font-size:76px;font-weight:700;
  color:rgba(200,30,30,.09);letter-spacing:12px;
  pointer-events:none;z-index:5;white-space:nowrap;user-select:none;
}

.scan-bar{
  position:absolute;top:-3px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  z-index:10;opacity:0;pointer-events:none;
}
.cert-paper.scanning .scan-bar{animation:scan .75s ease-out forwards}
@keyframes scan{0%{opacity:1;top:0}100%{opacity:0;top:720px}}

/* Cert header */
.ch{
  background:linear-gradient(118deg,var(--navy3) 0%,var(--navy) 60%,var(--navy2) 100%);
  padding:20px 28px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.ch-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.ch-sub{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:400;color:rgba(255,255,255,.55);margin-top:3px}
.ch-ref{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,.45);text-align:right;line-height:1.7}
.ch-ref span{color:var(--gold);font-weight:500;display:block}

/* Gold stripe */
.cstripe{height:2.5px;background:linear-gradient(90deg,var(--gold),#e8c854,var(--gold))}

/* Cert body */
.cbody{padding:24px 32px 20px}

.ct{
  font-family:'Playfair Display',serif;font-size:16px;font-weight:700;
  color:var(--navy);text-align:center;text-transform:uppercase;
  letter-spacing:3px;margin-bottom:5px;
}
[data-theme="dark"] .ct{color:#7a9bff}

.cyear{
  font-family:'DM Sans',sans-serif;font-size:9.5px;font-style:italic;
  color:var(--text3);text-align:center;margin-bottom:14px;
}
.corn{
  display:flex;align-items:center;gap:8px;width:160px;margin:0 auto 16px;
}
.corn-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.corn-r{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.corn-d{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}

.cintro{
  font-family:'DM Sans',sans-serif;font-size:10.5px;color:var(--text2);
  text-align:center;line-height:1.9;margin-bottom:13px;
}

.cname{
  background:linear-gradient(135deg,rgba(13,27,142,.06),rgba(13,27,142,.03));
  border:1px solid rgba(13,27,142,.12);border-radius:6px;
  padding:11px 14px;text-align:center;margin-bottom:13px;
}
[data-theme="dark"] .cname{background:rgba(82,114,255,.08);border-color:rgba(82,114,255,.18)}
.cname .civ{
  font-family:'DM Sans',sans-serif;font-size:8.5px;font-weight:600;
  color:var(--gold);text-transform:uppercase;letter-spacing:1px;
  display:block;margin-bottom:1px;
}
.cname .fn{
  font-family:'Playfair Display',serif;font-size:16px;font-weight:700;
  color:var(--navy);letter-spacing:1px;
}
[data-theme="dark"] .cname .fn{color:#7a9bff}

.cdetails{
  font-family:'DM Sans',sans-serif;font-size:10.5px;color:var(--text2);
  text-align:center;line-height:2;margin-bottom:12px;
}
.cdetails strong{color:var(--text);font-weight:600}
.cdetails .mono{font-family:'DM Mono',monospace;font-size:10px}

.cprog{
  background:var(--golddim);border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0;padding:9px 13px;margin-bottom:13px;
  font-family:'DM Sans',sans-serif;
}
.cprog .pl{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.8px}
.cprog .pn{font-size:11.5px;font-weight:600;color:var(--text);margin-top:2px}

.cvalid{
  background:rgba(255,248,220,.85);border:1px solid rgba(201,162,39,.28);
  border-radius:6px;padding:8px 12px;
  font-family:'DM Sans',sans-serif;font-size:9px;
  color:#7a6010;text-align:center;line-height:1.65;margin-bottom:18px;
}
[data-theme="dark"] .cvalid{background:rgba(201,162,39,.07);color:var(--gold)}

/* Signature row */
.csig{display:flex;align-items:flex-end;justify-content:space-between}
.csig-left{font-family:'DM Sans',sans-serif;font-size:9px;color:var(--text2)}
.csig-left .dv{display:block;font-weight:600;color:var(--text);font-size:9.5px;margin-top:2px}

/* QR corner */
.qr-area{display:flex;flex-direction:column;align-items:center;gap:4px}
.qr-frame{position:relative;width:58px;height:58px;display:flex;align-items:center;justify-content:center}
.qr-frame::before,.qr-frame::after{content:'';position:absolute;width:9px;height:9px}
.qr-frame::before{top:0;left:0;border-top:2px solid var(--gold);border-left:2px solid var(--gold)}
.qr-frame::after{bottom:0;right:0;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)}
.qr-inner{position:absolute;inset:0}
.qr-inner::before,.qr-inner::after{content:'';position:absolute;width:9px;height:9px}
.qr-inner::before{top:0;right:0;border-top:2px solid var(--gold);border-right:2px solid var(--gold)}
.qr-inner::after{bottom:0;left:0;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold)}
.qr-img{width:48px;height:48px;image-rendering:pixelated;border-radius:2px}
.qr-ph{
  width:48px;height:48px;border-radius:2px;
  background:repeating-linear-gradient(45deg,rgba(13,27,142,.07),rgba(13,27,142,.07) 2px,transparent 2px,transparent 8px);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:7px;color:var(--text3);text-align:center;line-height:1.4;
}
.qr-lbl{font-family:'DM Mono',monospace;font-size:7px;color:var(--gold);font-weight:500;letter-spacing:.4px;text-align:center}

.qr-badge{
  position:absolute;top:10px;right:10px;
  background:rgba(201,162,39,.1);border:1px solid var(--gold);
  border-radius:18px;padding:3px 9px;
  font-family:'DM Mono',monospace;font-size:8.5px;font-weight:500;
  color:var(--gold);letter-spacing:.4px;
  display:none;align-items:center;gap:5px;
}
.qr-badge.on{display:flex;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.28)}50%{box-shadow:0 0 0 4px rgba(201,162,39,0)}}
.qr-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.csig-right{text-align:center}
.csig-right .dlbl{font-family:'DM Sans',sans-serif;font-size:8.5px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
[data-theme="dark"] .csig-right .dlbl{color:var(--navy)}
.csig-right .dline{width:100px;height:1px;background:var(--border);margin:24px auto 5px}
.csig-right .dnote{font-family:'DM Sans',sans-serif;font-size:7.5px;color:var(--text3)}

/* Cert footer */
.cfooter{
  background:var(--navy3);padding:9px 28px;
  font-family:'DM Sans',sans-serif;font-size:8px;
  color:rgba(255,255,255,.45);text-align:center;letter-spacing:.1px;
}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:52px 20px;color:var(--text3);
}
.empty-icon{font-size:44px;opacity:.35}
.empty-txt{font-size:12.5px;text-align:center;line-height:1.6}

/* ACTIONS */
.pv-actions{display:none;align-items:center;gap:9px;align-self:flex-start}
.pv-actions.on{display:flex}
.btn-act{
  padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);
  font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all .2s;
}
.btn-act:hover{border-color:var(--navy);color:var(--navy)}
.btn-act.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-act.primary:hover{background:var(--navy2);box-shadow:0 4px 14px rgba(13,27,142,.28)}

/* ── HISTORY ── */
.hist-bar{
  background:var(--sidebar);border-top:1px solid var(--border);
  padding:16px 28px;transition:background .3s;
}
.hist-toggle{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;user-select:none;
}
.hist-title{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.hist-arrow{color:var(--text3);font-size:11px;transition:transform .2s}
.hist-toggle.open .hist-arrow{transform:rotate(180deg)}
.hist-list{margin-top:12px;display:none}
.hist-list.open{display:block}
.hist-row{
  display:flex;align-items:center;gap:12px;
  padding:9px 12px;border-radius:8px;
  background:var(--bg);margin-bottom:6px;
  transition:background .15s;
}
.hist-row:hover{background:var(--bg2)}
.hist-ref{font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;color:var(--navy);margin-bottom:2px}
.hist-name{font-size:12.5px;font-weight:500;color:var(--text)}
.hist-prog{font-size:11px;color:var(--text3)}
.hist-btns{display:flex;gap:6px;flex-shrink:0;margin-left:auto}
.hist-btn{
  padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text2);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;
  transition:all .15s;
}
.hist-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.hist-empty{text-align:center;color:var(--text3);font-size:12px;padding:14px}

/* TOAST */
#toast{
  position:fixed;bottom:22px;right:22px;
  padding:11px 16px;border-radius:9px;
  background:var(--navy);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  box-shadow:0 8px 22px rgba(0,0,0,.18);
  border-left:3px solid var(--gold);z-index:1000;
  opacity:0;transform:translateY(8px);
  transition:opacity .22s,transform .22s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateY(0)}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:60vh}
  .cert-paper{width:100%;max-width:520px}
  .pv-inner{padding:18px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">ESGCI</div>
    <div class="hdr-sub" data-i18n="app.subtitle">Générateur d'Attestations d'Inscription</div>
  </div>
  <div class="hdr-actions">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
    <button class="dark-btn" onclick="toggleDark()" title="Mode sombre"></button>
  </div>
</header>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-inner">
      <form id="attForm" novalidate>

        <div class="form-sec">
          <div class="sec-lbl" data-i18n="sec.identity">Identité</div>
          <div class="row">
            <div class="fld">
              <label><span data-i18n="lbl.civilite">Civilité</span> <span class="r">*</span></label>
              <select id="civilite">
                <option value="">—</option>
                <option value="M.">M.</option>
                <option value="Mme">Mme</option>
              </select>
            </div>
            <div class="fld">
              <label><span data-i18n="lbl.numEtu">N° Étudiant</span> <span class="r">*</span></label>
              <input id="numEtu" type="text" placeholder="ESGCI-2025-0001">
            </div>
          </div>
          <div class="row">
            <div class="fld">
              <label><span data-i18n="lbl.nom">Nom</span> <span class="r">*</span></label>
              <input id="nom" type="text" placeholder="DUPONT">
            </div>
            <div class="fld">
              <label><span data-i18n="lbl.prenom">Prénom</span> <span class="r">*</span></label>
              <input id="prenom" type="text" placeholder="Marie">
            </div>
          </div>
          <div class="row">
            <div class="fld">
              <label><span data-i18n="lbl.dateNaiss">Date de naissance</span> <span class="r">*</span></label>
              <input id="dateNaiss" type="date">
            </div>
            <div class="fld">
              <label data-i18n="lbl.nationalite">Nationalité</label>
              <input id="nationalite" type="text" placeholder="Française">
            </div>
          </div>
        </div>

        <div class="form-sec">
          <div class="sec-lbl" data-i18n="sec.academic">Scolarité</div>
          <div class="row full">
            <div class="fld">
              <label><span data-i18n="lbl.programme">Programme</span> <span class="r">*</span></label>
              <select id="programme">
                <option value="" data-i18n="opt.programme.empty">— Sélectionner un programme —</option>
                <option value="Bachelor Commerce International">Bachelor Commerce International</option>
                <option value="Bachelor Marketing &amp; Communication">Bachelor Marketing &amp; Communication</option>

/* ── UTILS ── */
const fmtD  = s => { if(!s)return'—'; const[y,m,d]=s.split('-'); return`${d}/${m}/${y}`; };
const todFR = () => new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
const todEN = () => new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
const mkRef = () => 'ESGCI-ATT-' + Date.now().toString(36).toUpperCase();
const civEN = fr => fr==='Mme'?'Ms.':'Mr.';
const stEN  = fr => ({'régulièrement inscrit(e)':'duly enrolled','en cours de formation':'currently enrolled'}[fr]||fr);

/* ── HASH (FNV-1a, works offline) ── */
function fnv32(s){
  let h=0x811c9dc5;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(Math.imul(h,0x01000193))>>>0}
  return h.toString(16).padStart(8,'0').toUpperCase();
}
function hash(d){
  const s=`ESGCI|${d.ref}|${d.nom.toUpperCase()}|${d.prenom.toUpperCase()}|${d.numEtu}|${d.programme}|${d.annee}`;
  return fnv32(s)+fnv32([...s].reverse().join('')+d.ref);
}

/* ── BASE64 (Unicode-safe) ── */
const enc64 = o => btoa(unescape(encodeURIComponent(JSON.stringify(o))));

/* ── VERIFY URL ── */
function verifyUrl(d,h){
  const p={r:d.ref,n:d.nom,p:d.prenom,i:d.numEtu,g:d.programme,a:d.annee,dt:d.today,h};
  return`verify.html?d=${enc64(p)}`;
}

/* ── QR GENERATION ── */
function genQR(text){
  return new Promise((res,rej)=>{
    if(!window.QRCode){rej(new Error('QRCode unavailable'));return}
    const c=document.createElement('canvas');
    QRCode.toCanvas(c,text,{width:256,margin:1,color:{dark:'#0d1b8e',light:'#ffffff'}},err=>{
      if(err)rej(err); else res(c.toDataURL('image/png'));
    });
  });
}

/* ── COLLECT FORM DATA ── */
function collect(isGen=false){
  const nom=document.getElementById('nom').value.trim();
  const prenom=document.getElementById('prenom').value.trim();
  const numEtu=document.getElementById('numEtu').value.trim();
  const programme=document.getElementById('programme').value;
  const annee=document.getElementById('annee').value;
  if(!nom||!prenom||!numEtu||!programme||!annee)return null;
  const civ=document.getElementById('civilite').value||'M.';
  const st=document.getElementById('statut').value;
  return{
    civilite:civ, civiliteEN:civEN(civ),
    nom, prenom,
    dateNaiss:document.getElementById('dateNaiss').value,
    nationalite:document.getElementById('nationalite').value.trim()||'Française',
    numEtu, programme, annee, statut:st, statutEN:stEN(st),
    dateInscription:document.getElementById('dateInscription').value,
    email:document.getElementById('email').value.trim(),
    today:todFR(), todayEN:todEN(),
    ref:isGen?mkRef():'PREV-'+Date.now().toString(36).toUpperCase().slice(-6),
  };
}

      :'The Director of ESGCI — School of International Business and Management<br>hereby certifies that:'

/* ── LIVE PREVIEW ── */
async function livePreview(){
  const d=collect(false);
  const content=document.getElementById('certContent');
  if(!d){
    content.innerHTML=`<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-txt">${t('empty.preview')}</div></div>`;
    document.getElementById('qrBadge').classList.remove('on');
    return;
  }
  let qr=null;
  try{
    const h=hash(d);
    const url=verifyUrl(d,h);
    qr=await genQR(url);
  }catch(e){/* pas de QR */}
  content.innerHTML=certHTML(d,qr,activeTab);
  document.getElementById('qrBadge').classList.toggle('on',!!qr);
}

/* ── GENERATE ── */
async function handleGenerate(){
  const d=collect(true);
  if(!d){showToast(t('toast.required'));return}
  if(!document.getElementById('civilite').value||!document.getElementById('dateNaiss').value){
    showToast(t('toast.civdob'));return;
  }
  const btn=document.getElementById('btnGen');
  btn.disabled=true;
  document.getElementById('btnIcon').textContent='⏳';
  document.getElementById('btnTxt').textContent='Génération en cours…';

  const paper=document.getElementById('certPaper');
  paper.classList.add('glow','scanning');
  setTimeout(()=>paper.classList.remove('scanning'),820);

  try{
    const h=hash(d);
    lastVerUrl=verifyUrl(d,h);
    let qr=null;
    try{qr=await genQR(lastVerUrl)}catch(e){}
    lastData=d; lastQrUrl=qr;
    document.getElementById('certContent').innerHTML=certHTML(d,qr,activeTab);
    document.getElementById('qrBadge').classList.toggle('on',!!qr);
    document.getElementById('pvActions').classList.add('on');
    const fn=await buildPDF(d,qr);
    addHist(d,qr,fn);
    showToast(`✔ ${fn} ${t('toast.dl.suffix')}`);
    setTimeout(()=>paper.classList.remove('glow'),1600);
  }catch(err){
    showToast(t('toast.error'));
    console.error(err);
    paper.classList.remove('glow');
  }
  btn.disabled=false;
  document.getElementById('btnIcon').textContent='↓';
  document.getElementById('btnTxt').textContent='Générer PDF bilingue + QR Code';
}

function handleDownload(){if(lastData)buildPDF(lastData,lastQrUrl).then(()=>showToast(t('toast.redl')))}

function copyLink(){
  if(!lastVerUrl){showToast(t('toast.noatt'));return}
  navigator.clipboard.writeText(lastVerUrl).then(()=>showToast(t('toast.copied'))).catch(()=>{
    const el=document.createElement('textarea');
    el.value=lastVerUrl;document.body.appendChild(el);el.select();
    document.execCommand('copy');document.body.removeChild(el);
    showToast(t('toast.copied'));
  });
}

/* ── PDF ── */
async function buildPDF(d,qrSrc){
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  pdfPage(doc,d,qrSrc,'fr');
  doc.addPage();
  pdfPage(doc,d,qrSrc,'en');
  const fn=`Attestation_${d.nom}_${d.prenom}_${d.ref}.pdf`;
  doc.save(fn);
  return fn;
}

  doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(140);

              :`${d.civiliteEN} ${d.prenom.toUpperCase()} ${d.nom.toUpperCase()}`;

  if(d.dateInscription){
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(120);
    doc.text(`${fr?'Date d\'inscription':'Enrollment date'} : ${fmtD(d.dateInscription)}`,105,y,{align:'center'});
    y+=10;
  }

  /* signature row */
  const sy=Math.max(y+8,244);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(60);
  doc.text(fr?`Fait a Paris, le ${d.today}`:`Issued in Paris, on ${d.todayEN}`,22,sy);

  /* QR code */
  const qx=89,qy=sy-2,qs=28;
  if(qrSrc){
    doc.setDrawColor(201,162,39); doc.setLineWidth(0.8);
    doc.line(qx-2,qy-2,qx+6,qy-2); doc.line(qx-2,qy-2,qx-2,qy+6);
    doc.line(qx+qs+2,qy-2,qx+qs-4,qy-2); doc.line(qx+qs+2,qy-2,qx+qs+2,qy+6);
    doc.line(qx-2,qy+qs+2,qx+6,qy+qs+2); doc.line(qx-2,qy+qs+2,qx-2,qy+qs-4);
    doc.line(qx+qs+2,qy+qs+2,qx+qs-4,qy+qs+2); doc.line(qx+qs+2,qy+qs+2,qx+qs+2,qy+qs-4);
    doc.addImage(qrSrc,'PNG',qx,qy,qs,qs);
    doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(150);
    doc.text(fr?'SCANNER POUR VERIFIER':'SCAN TO VERIFY',qx+qs/2,qy+qs+5,{align:'center'});
  }else{
    doc.setDrawColor(13,27,142); doc.setLineWidth(0.7);
    doc.circle(105,sy+14,13,'S');
    doc.setLineWidth(0.3); doc.circle(105,sy+14,11,'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(13,27,142);
    doc.text(fr?'CACHET':'OFFICIAL',105,sy+12,{align:'center'});
    doc.text(fr?'OFFICIEL':'STAMP',105,sy+17,{align:'center'});
  }

  /* director */
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(13,27,142);
  doc.text(fr?'Le Directeur des Etudes':'Director of Studies',190,sy,{align:'right'});
  doc.setDrawColor(180); doc.setLineWidth(0.3);
  doc.line(140,sy+28,190,sy+28);
  doc.setFont('helvetica','italic'); doc.setFontSize(7.5); doc.setTextColor(160);
  doc.text(fr?'Signature et cachet':'Signature and stamp',165,sy+34,{align:'center'});

  /* watermark SAMPLE */
  try{doc.setGState(doc.GState({opacity:.07,'fill_opacity':.07}))}catch(e){}
  doc.setFont('helvetica','bold');
  doc.setFontSize(74);
  doc.setTextColor(200,30,30);
  doc.text('SAMPLE',105,148,{align:'center',angle:35});
  try{doc.setGState(doc.GState({opacity:1,'fill_opacity':1}))}catch(e){}
  doc.setTextColor(0,0,0);
}

/* ── HISTORY ── */
function addHist(d,qr,fn){
  history.unshift({d,qr,fn});
  renderHist();
}
function renderHist(){
  const el=document.getElementById('histList');
  if(!history.length){el.innerHTML=`<div class="hist-empty">${t('hist.empty')}</div>`;return}
  el.innerHTML=history.slice(0,10).map((h,i)=>`
    <div class="hist-row">
      <div style="flex:1;min-width:0">
        <div class="hist-ref">${h.d.ref}</div>
        <div class="hist-name">${h.d.civilite} ${h.d.prenom} ${h.d.nom.toUpperCase()}</div>
        <div class="hist-prog">${h.d.programme} · ${h.d.annee}</div>
      </div>
      <div class="hist-btns">
        <button class="hist-btn" onclick="reDL(${i})">↓ PDF</button>
        <button class="hist-btn" onclick="showHist(${i})">👁 Voir</button>
      </div>
    </div>
  `).join('');
  if(!histOpen)toggleHist();
}
function reDL(i){buildPDF(history[i].d,history[i].qr).then(()=>showToast(t('toast.redl')))}
function showHist(i){
  const h=history[i];
  lastData=h.d;lastQrUrl=h.qr;
  document.getElementById('certContent').innerHTML=certHTML(h.d,h.qr,activeTab);
  document.getElementById('qrBadge').classList.toggle('on',!!h.qr);
  document.getElementById('pvActions').classList.add('on');
  document.querySelector('.preview-pane').scrollIntoView({behavior:'smooth'});
}
function toggleHist(){
  histOpen=!histOpen;
  document.getElementById('histList').classList.toggle('open',histOpen);
  document.getElementById('histToggle').classList.toggle('open',histOpen);
}

/* ── DARK MODE ── */
function toggleDark(){
  document.documentElement.setAttribute('data-theme',
    document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── INIT ── */
applyLang();
document.getElementById('certContent').innerHTML=`
  <div class="empty-state">
    <div class="empty-icon">📄</div>
    <div class="empty-txt">${t('empty.init')}</div>
  </div>`;
</script>
